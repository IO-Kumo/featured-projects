<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Counter</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Header -->
    <header class="page-header">
      <h1 class="page-header__page-title">Click counter</h1>
    </header>
    <!-- Main -->
    <main class="page-main">
      <div class="page-main__BTN">
        <button id="click-BTN">Click</button>
        <button id="subtract-BTN">Subtract</button>
        <button id="reset-BTN">Reset</button>
      </div>
      <div class="page-main__counter">
        <p class="click-count-label">
          Click count: <span class="click-count-value">0</span>
        </p>
      </div>
    </main>
  </body>
</html>
